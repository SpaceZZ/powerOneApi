  /v1/device/:
    get:
      tags:
      - Devices
      summary: Compact Hierarchy from Serial Number
      description: Allows to dynamically retrieve the compaxt hierarchy starting from the device Serial Number.<br>The compact hierarchy dynamically adapts according to the type of device inserted in the request.<br><hr><strong>Returns:</strong><ul><li>Plant Entity ID</li><li>Plant Name</li><li>Entity Type</li><li>Plant State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br></li><li>Logger Entity ID (<i>only if device searched is connected to an exeternal logger</i>)</li><li>Entity Type</li><li>Logger State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br><li>Device Entity ID</li><li>Device Type</li><li>Device State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br><li>Device Serial Number (<i>Aurora Vision Format</i>)</li><li>Device Model</li><li>Communication Master MAC Address (<i>if available</i>)</li><li>Communication Master (<i>if available</i>)</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/device/?serialNumber=2210123456 "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetCompactHierarchyfromSerialNumber
      parameters:
      - name: serialNumber
        in: query
        description: 'Device Serial Number: <ul><li><strong>Aurora Vision Format</strong>: 123456-PPPP-WWYY</li><li><strong>Production Format</strong>: YYWW123456</ul>Serial Number Parts:<br><i><ul><li>Sequential Number = 123456</li><li>Part Number = PPPP</li><li>Production Week = WW</li><li>Production Year = YY</i>'
        required: true
        style: form
        explode: true
        schema:
          type: string
          example: '123456-PPPP-WWYY or YYWW123456'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                   entityID: 12345678,
                   Name: 'Plant 01',
                   type: 'Plant',
                   state: "ACTIVE",
                   children: [
                     {
                      entityID: 1111111,
                      type: 'Battery',
                      state: 'ACTIVE',
                      serialNumber: '123456-1P123-1234',
                      model: 'FIMER REACT2-BATT',
                      deviceFWVersion: 'Version 1234',
                      macAddress: 'aa:aa:aa:aa:aa:aa',
                      communicationMaster: 'REACT2-5.0-TL SN 123456-1P111-1234',
                    }
                  ]
               }
        400:
          description: 'Device Serial Number invalid or incomplete'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
