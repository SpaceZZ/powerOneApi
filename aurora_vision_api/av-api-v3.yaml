                            deviceStatus: "MEDIUM"
                          }
                      ]
                    }
                  ]
              }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/plant/{entityID}/events:
    get:
      tags:
      - Plants
      summary: Plant Events
      description: Allows to retrieve the list of Plant's Events. <br><hr><strong>Returns:</strong><ul><strong>For every event in the list:</strong><li>Plant Entity ID </li><li>Plant Name</li><li>Device Entity ID (<i>the reference device is the one impacted by the event</i> )</li><li>Device Identifying Adress (<i>the reference device is the one impacted by the event</i> ) </li><li>Event Type</li><li>Event Severity</li><li>Event Start Date (<i>UTC Time</i>)</li><li>Event End Date (<i>UTC Time</i>)</li></ul><br></strong><ul><strong>General information:</strong><li>Last Page (<i>boolean</i>)</li><li>First Page (<i>boolean</i>)</li><li>Number of elements in the page</li><li>Total elements in the portfolio</li><li>Total pages</li><li>Page size</li><li>Page number</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/plant/12345678/events?eventsKind=PROFILE&eventsState=ACTIVE&eventsOccurrence=H24 --header "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetPlantEvents
      parameters:
      - name: entityID
        in: path
        description: 'Plant ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      - name: eventsKind
        in: query
        description: 'Filter the events kind to display: <ul><li><strong>Profile</strong>: events mapped on the profile configured on Aurora Vision;</li><li><strong>Source</strong>: machine events mapped to Aurora Vision;</li></ul>(<i>Please refer to:&nbsp; <a href="#" target="_blank_">Aurora Vision APIs - User Guide - Error Status Management</a></i>&nbsp;)'
        required: true
        style: form
        explode: true
        schema:
          type: string
          enum:
          - 'PROFILE'
          - 'SOURCE'
          example: 'PROFILE'
      - name: eventsType
        in: query
        description: 'Filter the type of events to display<br>(<i>Please refer to:&nbsp; <a href="#" target="_blank_">Aurora Vision APIs - User Guide - Error Status Management</a></i>&nbsp;)'
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - 'NOTCOM'
          - 'DEVCOM'
          - 'LOGCOM'
          - 'PWROFF'
          - 'GENFLT'
          - 'GENALR'
          - 'TMPFLT'
          - 'TMPALR'
          - 'ACGFLT'
          - 'ACGALR'
          - 'ACVFLT'
          - 'ACVALR'
          - 'ACIFLT'
          - 'ACFFLT'
          - 'ACFALR'
          - 'DCGFLT'
          - 'DCVFLT'
          - 'DCIFLT'
          - 'STROFF'
          - 'DCVALR'
          - 'ACIALR'
          - 'VDCLOW'
          - 'SUBOFF'
          - 'PR-ING'
          - 'DCGALR'
          - 'DCIALR'
          - 'GENSTS'
          - 'TMPSTS'
          - 'ACGSTS'
          - 'ACVSTS'
          - 'ACISTS'
          - 'ACFSTS'
          - 'DCGSTS'
          - 'DCVSTS'
          - 'DCISTS'
          - 'MNTFLT'
          - 'MNTALR'
          - 'MNTSTS'
          - 'EXPLMT'
          example: 'LOGCOM'
      - name: eventsState
        in: query
        description: 'Filter the state of events to display'
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - 'ALL'
          - 'ACTIVE'
          - 'CLOSED'
          example: 'ACTIVE'
      - name: eventsOccurrence
        in: query
        description: 'Filter the occurence of events to display'
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - 'H24'
          - 'D7'
          - 'D30'
          example: 'H24'
      - name: page
        in: query
        description: 'Page number'
        required: false
        style: form
        explode: true
        schema:
          type: integer
          format: int32
          example: '0'
          default: '0 ( = First Page )'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 content: [ 
                   {
                   plantEntityID: 0,
                   plantName: 'Name',
                   loggerEntityID: 12345678,
                   loggerMACAddress: 'AA:00:AA:00:AA:00',
                   eventSeverity: 'HIGH',
                   eventType: 'LOGCOM',
                   eventStart: '2020-12-14 11:43 AM +0000',
                   eventEnd: '2020-12-15 11:43 AM +0000',
                   },
                   {
                   plantEntityID: 0,
                   plantName: 'Name',
                   deviceEntityID: 12345678,
                   deviceSerialNumber: '123456-1P123-1234',
                   eventSeverity: 'MEDIUM',
                   eventType: 'DEVCOM',
                   eventStart: '2020-12-14 11:43 AM +0000',
                   eventEnd: '2020-12-15 11:43 AM +0000',
                   },
                 ],
                 lastPage: 'false',
                 fisrtPage: 'true',
                 numberOfElements: 50,
                 totalElements: 82,
                 totalPages: 2,
                 pageSize: 50,
                 pageNumber: 0
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
