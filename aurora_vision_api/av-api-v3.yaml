                 loggerEntityID: 12345678,
                      loggerName: "A0:A0:A0:A0:A0:A0",
                      loggerState: "active",
                      loggerStatus: "MEDIUM",
                      deviceStatuses: [
                          {
                            deviceEntityID: 12345678,
                            deviceName: "inverter_001_",
                            deviceState: "active",
                            deviceSerialNumber: "123456-1P23-1234",
                            deviceManufacturer: "FIMER",
                            deviceStatus: "MEDIUM"
                          }
