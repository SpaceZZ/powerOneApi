  /v1/kpis/aggregated/{entityID}/{dataType}/{valueType}:
    get:
      tags:
      - KPIs
      summary: Aggregated KPIs (Key Performance Indicators)
      description: Allows to retrieve aggregated Power-Data KPIs or Energy-Data KPIs values of a Plant.<br><hr><strong>Note:</strong> <i>the API may respond with empty resources if you do not have certain devices correctly installed in relation to the telemetry information that you want to call.</i><hr><strong>Returns:</strong><ul><li>Start ( <i>Epoch</i> )</li><li>Units ( <i>kWh or % for Energy-Based KPIs, Watts or % for Power-Based KPIs</i> )</li><li>Value</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'"><a href="#" target="_blank_">Aurora Vision APIs - User Guide - Telemetries Data</a></p>
      operationId: GetKPI-aggregated
      parameters:
      - name: entityID
        in: path
        description: 'Plant or Device ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      - name: dataType
        in: path
        description: 'Data type for the API call(s).<br><br><strong>Power-Based KPIs</strong>: StateofCharge, StateofHealth, LoadsPowerConsumed, LoadsPowerConsumedPV<br><br><strong>Energy-Based KPIs</strong>: PerformanceRatio, SelfConsumption, SelfSufficiency, LoadsEnergyConsumed, LoadsEnergyConsumedPV<br><hr><i>Please note that for the <strong>PerformanceRatio</strong> dataType the algorithm set as default is used as reference for the percentage calculation (for more information check your plant configuration in the management section in Plant Portfolio Manager)<i><hr>'
        required: true
        style: simple
        schema:
          type: string
          enum:
          - 'PerformanceRatio'
          - 'StateOfCharge'
          - 'StateOfHealth'
          - 'SelfConsumption'
          - 'SelfSufficiency'
          - 'LoadsEnergyConsumed'
          - 'LoadsEnergyConsumedPV'
          - 'LoadsPowerConsumed'
          - 'LoadsPowerConsumedPV'
          example: 'LoadsPowerConsumed'
      - name: valueType
        in: path
        description: 'Value type for the API call(s).<br>Distinction of ValueType(s) to be used based on the KPIs you want to call:<br><br><strong>Power-Based KPIs</strong>: maximum, minimum, average<br><br><strong>Energy-Based KPIs</strong>: cumulative, delta<br><hr><i>For the <strong>PerformanceRatio</strong> dataType use the <strong>delta</strong> valueType<i><hr>'
        required: true
        style: simple
        schema:
          type: string
          enum:
          - 'maximum'
          - 'minimum'
          - 'average'
          - 'cumulative'
          - 'delta'
          example: 'average'
      - name: startDate
        in: query
        description: 'Start Date<br> ( <i>Pattern:</i> yyyyMMdd )'
        required: true
        style: form
        explode: true
        schema:
          type: string
          format: datetime
          example: '20220101'
      - name: endDate
        in: query
        description: 'End Date<br> ( <i>Pattern:</i> yyyyMMdd )'
        required: true
        style: form
        explode: true
        schema:
          type: string
          format: datetime
          example: '20220102'
      - name: timeZone
        in: query
        description: 'Plant Time Zone<br> ( <i>Format:</i> Civilian abbreviation or Country/City )'
        required: true
        style: form
        explode: true
        schema:
          type: string
          example: 'Europe/Rome'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example:
               result:
                {
                  start: 1608018600,
                  units: "whole-percent",
                  value: 12.3456789
                }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/region:
    get:
      tags:
      - Regions
      summary: Regions
      description: Allows to retrieve available regions/states in a Country as stored in Aurora Vision. <br><hr><strong>Returns:</strong><ul><li>Province Name</li><li>Province Code</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/region?countryCode=AF "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetRegions
      parameters:
      - name: countryCode
        in: query
        description: 'ISO 3166 Alpha2 Country Code Format Standard <br><br>(<i>Please refer to:&nbsp; <a href="https://en.wikipedia.org/wiki/ISO_3166-1" target="_blank_">ISO 3166-1 Wikipedia</a></i>&nbsp;)'
        required: true
        style: form
        explode: true
        schema:
          type: string
          example: 'AF'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example:
