openapi: 3.0.0
info:
  title: Aurora Vison APIs
  description: Harness the power of data from FIMER's photovoltaic systems
  version: '1.0'
servers:
- url: https://api.auroravision.net/api/rest
  variables: {}
paths:
  /status:
    get:
      tags:
      - Service Info
      summary: Maintenance Status
      description: Allows to retrieve the Aurora Vision maintenance banner to know if there are any scheduled or ongoing maintenance.<br>If no banner is present, therefore no maintenance is scheduled or ongoing, the API response will provide empty content.<br><hr><strong>Returns:</strong><ul><li>Aurora Vision Maintanance Banner</li></ul><hr><strong>Example (CURL)</strong><br>curl --request GET https://api.auroravision.net/api/rest/status
      operationId: Retrieve Maintenance Banner
      responses:
        200:
          description: 'OK'
          content:
           application/json:
              example: 
               result: "Dear customer, Aurora Vision will be down for maintenance on 01/12/2021 starting from 8:00 AM CET.All services will be temporarily unavailable, however no data loss will occur. We apologize for the inconvenience and appreciate your understanding."
        204:
          description: 'No content available'
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter/header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /eula:
    get:
      tags:
      - Service Agreements
      summary: EULA
      description: Allows user to actively retrieve and read the Aurora Vision EULA.<br><br><strong>Note:</strong> the API also needs the Aurora Vision account credentials (<i>UserID</i> and <i>Password</i>) nested in the call via <i>HTTP Basic Authentication</i> method.<hr><strong>Returns:</strong><ul><li>Aurora Vision's EULA</li></ul><hr><strong>Example (CURL)</strong><br><a href="https://documentation.auroravision.net/index.html%3Fp=1271.html" target="_blank_">Aurora Vision APIs - User Guide - Rate Limit</a>
      operationId: Retrieve EULA
      parameters:
      - name: X-AuroraVision-ApiKey
        in: header
        description: 'Aurora Vision Api-Key'
        required: true
        style: simple
        schema:
          type: string
          example: '1a23b456-c789-1d23-12ef-ghil123456mn-1o23'
      responses:
        200:
          description: 'OK'
          content:
           application/json:
              example:
               result: "IMPORTANT: PLEASE READ THE TERMS AND CONDITIONS OF THIS EULA CAREFULLY BEFORE CONTINUING WITH THE INSTALLATION OF TOOLS, MOBILE APPLICATIONS AND/OR THE USE OF OTHER AURORA VISION"
           application/html:
              example:
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter/header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
    put:
      tags:
      - Service Agreements
      summary: Accept EULA
      description: Allows user to accept the Aurora Vision EULA.<br><br><strong>Note:</strong> the API also needs the Aurora Vision account credentials (<i>UserID</i> and <i>Password</i>) nested in the call via <i>HTTP Basic Authentication</i> method.<hr><strong>Returns:</strong><ul><li>Aurora Vision's EULA Acceptance Status</li></ul><hr><strong>Example (CURL)</strong><br><a href="https://documentation.auroravision.net/index.html%3Fp=1271.html" target="_blank_">Aurora Vision APIs - User Guide - Rate Limit</a>
      operationId: Accept EULA
      parameters:
      - name: X-AuroraVision-ApiKey
        in: header
        description: 'Aurora Vision Api-Key'
        required: true
        style: simple
        schema:
          type: string
          example: '1a23b456-c789-1d23-12ef-ghil123456mn-1o23'
      responses:
        200:
          description: 'OK'
          content:
           application/json:
              example:
               result: "ACCEPTED"
           application/html:
              example:
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter/header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /authenticate:
    get:
      tags:
      - Authentication
      summary: Authenticate
      description: Allows user to authenticate to the Aurora Vision APIs service to obtain the <i>X-AuroraVision-Token</i> to correctly use the APIs calls made available. The <i>X-AuroraVision-Token</i> is subject to the terms of the EULA and expires after 60 minutes of complete inactivity; if the terms of the EULA have not been accepted, the API will respond with a dedicated error.<br><br><strong>Note:</strong> the API also needs the Aurora Vision account credentials (<i>UserID</i> and <i>Password</i>) nested in the call via <i>HTTP Basic Authentication</i> method.<hr><strong>Returns:</strong><ul><li>Aurora Vision Access Token</li></ul><hr><strong>Example (CURL)</strong><br><a href="https://documentation.auroravision.net/index.html%3Fp=1269.html" target="_blank_">Aurora Vision APIs - User Guide - Authentication</a>
      operationId: Authenticate
      parameters:
      - name: X-AuroraVision-ApiKey
        in: header
        description: 'Aurora Vision Api-Key'
        required: true
        style: simple
        schema:
          type: string
          example: '1a23b456-c789-1d23-12ef-ghil123456mn-1o23'
      responses:
        200:
          description: 'OK'
          content:
           application/json:
              example: 
               result: "Abcdef1ghi2=?//lmno3456pqvw789yz!"
           application/xml:
              example:
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter/header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        500:
          description: 'EULA Not Accepted'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/asset/{entityID}/info:
    get:
      tags:
      - Assets
      summary: Asset Info
      description: Allows to retrieve info on an Aurora Vision Asset.<br> An Asset can be a Portfolio, Plant, Plant Group, Logger or Device.<br><hr><strong>Returns:</strong><ul><li>Asset's Entity ID</li><li>Asset's Category</li><li>Asset's Name</li><li>Asset's Description <i>(if available</i>)</li><li>Asset's State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br></li><li>Parents Entity ID(s) (<i>if available</i>)</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl -- https://api.auroravision.net/api/rest/v1/asset/12345678/info --header "X-AuroraVision-Token:cdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetAssetInfo
      parameters:
      - name: entityID
        in: path
        description: 'Asset entityID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 assetEntityID: 12345678,
                 assetCategory: [ 'Plant' ],
                 assetName: 'Name',
                 assetDescription: '',
                 assetState: 'ACTIVE',
                 parentsEIDs: [ 12345678 ]
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/portfolioGroup:
    get:
      tags:
      - Organizations
      summary: Portfolios in Organization
      description: Allows to retrieve info on the Organization (<i>PortfolioGroup</i>) the user is associated with together with the list of active portfolios contained in the Organization (<i>portfolioGroupPortfolios</i>).<br><hr><strong>Returns:</strong><ul><li>Organization Entity ID</li><li>Organization Name</li><br><b>For every portfolio in the list:</b><ul><li>Portfolio Entity ID</li><li>Portfolio Name</li></ul></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'"><a href="#" target="_blank_">Aurora Vision APIs - User Guide - Hierarchical Structure</a></p>
      operationId: GetPortfoliosInOrganization
      parameters:
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result:
                 {
                  portfolioGroupEntityID: 12345678,
                  portfolioGroupName: "Organization",
                  portfolioGroupPortfolios: [
                    {
                      portfolioEntityID: 12345678,
                      portfolioName: "Portfolio 1"
                    },
                    {
                      portfolioEntityID: 12345678,
                      portfolioName: "Portfolio 2"
                    }
                  ]
              }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
        204:
          description: 'No content (user not associated to an organization)'
      deprecated: false
  /v1/portfolio/{entityID}/plants:
    get:
      tags:
      - Portfolios
      summary: Plants in Portfolio
      description: Allows to retrieve the list of Plants in a Portfolio. <br><hr><strong>Returns:</strong><ul><strong>For every plant in the list:</strong><li>Plant Entity ID </li><li>Plant Name</li><li>Plant Description (<i>if available</i>)</li><li>Plant State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br><li>Plant Status <ul><li><strong>NORM</strong></li><li><strong>LOW</strong></li><li><strong>MEDIUM</strong></li><li><strong>HIGH</strong></li></ul></ul><br></strong><ul><strong>General information:</strong><li>Last Page (<i>boolean</i>)</li><li>First Page (<i>boolean</i>)</li><li>Number of elements in the page</li><li>Total elements in the portfolio</li><li>Total pages</li><li>Page size</li><li>Page number</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'"><a href="#" target="_blank_">Aurora Vision APIs - User Guide - Hierarchical Structure</a></p>
      operationId: GetPlantsinPortfolio
      parameters:
      - name: entityID
        in: path
        description: 'Portfolio ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      - name: page
        in: query
        description: 'Page Number<br> If not entered, the API always returns the first page.'
        required: false
        style: form
        explode: true
        schema:
          type: integer
          format: int32
          example: '0'
          default: '0 ( = First Page )'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 content: [ 
                   {
                   plantEntityID: 0,
                   plantName: 'Name',
                   plantDescription: 'Description',
                   plantState: 'ACTIVE',
                   plantStatus: 'NORM',
                   },
                   {
                   plantEntityID: 1,
                   plantName: 'Name',
                   plantDescription: 'Description',
                   plantState: 'ACTIVE',
                   plantStatus: 'MEDIUM',
                   },
                 ],
                 lastPage: 'false',
                 fisrtPage: 'true',
                 numberOfElements: 50,
                 totalElements: 700,
                 totalPages: 50,
                 pageSize: 50,
                 pageNumber: 0
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/portfolio/{entityID}/plantGroups:
    get:
      tags:
      - Portfolios
      summary: Plant Groups in Portfolio
      description: Allows to retrieve the list of Plant Groups in a Portfolio. <br><hr><strong>Returns:</strong><ul><strong>For every plant group in the list:</strong><li>Plant Group Entity ID </li><li>Plant Group Name</li><li>Plant Group State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul></li></ul><br></strong><ul><strong>General portfolio information:</strong><li>Last Page (<i>boolean</i>)</li><li>First Page (<i>boolean</i>)</li><li>Number of elements in the page</li><li>Total elements in the portfolio</li><li>Total pages</li><li>Page size</li><li>Page number</li></ul><hr><strong>Fully Structured API Call Example</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/portfolio/12345678/plantGroups --header "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetPlantGroupsinPortfolio
      parameters:
      - name: entityID
        in: path
        description: 'Portfolio ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      - name: page
        in: query
        description: 'Page Number<br> If not entered, the API always returns the first page.'
        required: false
        style: form
        explode: true
        schema:
          type: integer
          format: int32
          example: '0'
          default: '0 ( = First Page )'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 content: [ 
                   {
                   plantGroupEntityID: 0,
                   plantGroupName: 'Name',
                   plantGroupState: 'ACTIVE',
                   },
                   {
                   plantGroupEntityID: 1,
                   plantGroupName: 'Name',
                   plantGroupState: 'DELETED',
                   },
                 ],
                 lastPage: 'false',
                 fisrtPage: 'true',
                 numberOfElements: 15,
                 totalElements: 15,
                 totalPages: 1,
                 pageSize: 50,
                 pageNumber: 0
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/portfolio/{entityID}/info:
    get:
      tags:
      - Portfolios
      summary: Portfolio Info
      description: Allows to retrieve info of a Portfolio.<br><hr><strong>Returns:</strong><ul><li>Portfolio's Entity ID</li><li>Portfolio's Name</li></li><li>Portfolio's State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul></li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/portfolio/12345678/info --header "X-AuroraVision-Token:cdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetPortfolioInfo
      parameters:
      - name: entityID
        in: path
        description: 'Portfolio ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: string
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 portfolioEntityID: 0,
                 portfolioName: 'Name',
                 portfolioState: 'ACTIVE',
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/plantGroup/{entityID}/plants:
    get:
      tags:
      - Plant Groups
      summary: Plants in Plant Group
      description: Allows to retrieve the list of Plant(s) in a Plant Group.<br><hr><strong>Returns:</strong><ul><strong>For every plant in the list:</strong><li>Plant Entity ID </li><li>Plant Name</li><li>Plant Description (<i>if available</i>)</li><li>Plant State<ul><li><b>ACTIVE</b></li><li><b>DELINQUENT</b></li><li><b>DECOMMISSIONED</b></li></ul></li><br><li>Plant Status <ul><li><b>NORMAL</b></li><li><b>LOW</b></li><li><b>MEDIUM</b></li><li><b>HIGH</b></li></ul></li></ul></li></ul><br></strong></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/plantGroup/12345678/plants --header "X-AuroraVision-Token:cdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetPlantsinPlantGroup
      parameters:
      - name: entityID
        in: path
        description: 'Plant Group ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      - name: plantStatus
        in: query
        description: 'Plant Status'
        required: false
        style: form
        explode: true
        schema:
          type: string
          enum:
          - 'HIGH'
          - 'MEDIUM'
          - 'LOW'
          - 'NORM'
          - 'INFO'
          example: 'plantStatus'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 plantEntityID: 0,
                 plantName: 'Name',
                 plantDescription: 'Description',
                 plantState: 'ACTIVE',
                 plantStatus: 'NORM',
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/plantGroup/{entityID}/info:
    get:
      tags:
      - Plant Groups
      summary: Plant Group Info
      description: Allows to retrieve info on a Plant Group.<br><hr><strong>Returns:</strong><ul><li>Plant Group's Entity ID</li><li>Plant Group's Name</li><li>Plant Group's State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br></li><li>Portfolio Entity ID(s) (<i>Hierarchy Parent</i>)</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/plantGroup/12345678/info --header "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetPlantGroupInfo
      parameters:
      - name: entityID
        in: path
        description: 'Plant Group ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 plantGroupEntityID: 0,
                 plantGroupName: 'Name',
                 plantGroupState: 'ACTIVE',
                 portfolioEID: 123,
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/plant/{entityID}/loggers:
    get:
      tags:
      - Plants
      summary: Loggers in Plant
      description: Allows to retrieve the list of Loggers in a Plant. <br><hr><strong>Returns:</strong><ul><strong>For every logger in the list:</strong><li>Logger Entity ID </li><li>Logger Name</li><li>Logger Description (<i>model description</i>)</li><li>Logger State<ul><li><strong>ACTIVE</strong></li><li><strong>DELINQUENT</strong></li><li><strong>DECOMMISSIONED</strong></li></ul><br></li><li>Logger MAC Address</li><li>Logger Manufacturer</li><li>Logger Model</li></ul><br></strong></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/plant/12345678/loggers --header "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetLoggersinPlant
      parameters:
      - name: entityID
        in: path
        description: 'Plant ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                 plantEntityID: 0,
                 loggers: [
                  {
                    loggerEntityID: 1,
                    loggerName: 'Name',
                    loggerDescription: 'Logger Card',
                    loggerState: 'ACTIVE',
                    loggerMACAddress: 'AA:00:AA:00:AA:00',
                    loggerManufacturer: 'Manufacturer',
                    loggerModel: 'Model',
                  }
                ]
               }
        400:
          description: 'Malformed or missing authorization token or malformed or missing parameter / header'
        401:
          description: 'Bad credentials or Authorization'
        403:
          description: 'Mount point or asset not accessible'
        404:
          description: 'Mount point or asset not found'
        405:
          description: 'HTTP method not allowed for the selected mount point'
        503:
          description: 'Service not available at the moment'
      deprecated: false
  /v1/plant/{entityID}/billingData:
    get:
      tags:
      - Plants
      summary: Billing Data
