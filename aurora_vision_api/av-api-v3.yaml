  /v1/plant/{entityID}/status:
    get:
      tags:
      - Plants
      summary: Plant Status
      description: Allows to retrieve Plant status. If the Plant Status is different from NORMAL, returns the hierarchical explosion of loggers/devices affected by a status different from NORMAL.<br><hr><strong>Note:</strong> <i>The severity of the events depends on the configured error profile assigned to the specific plant being called. For more information check the "Profile Configuration" section on Plant Portfolio Manager.</i><hr><strong>Returns:</strong><ul><li>Plant's Entity ID</li><li>Plant Name</li><li>Plant State <ul><li><b>ACTIVE</b></li><li><b>DELINQUENT</b></li><li><b>DECOMMISSIONED</b></li></ul></li><br><li>Plant Status <ul><li><b>NORM</b></li><li><b>LOW</b></li><li><b>MEDIUM</b></li><li><b>HIGH</b></li></ul></li></ul><p><i>Only if a logger entity has a STATUS different from NORMAL</i>:</p><ul><li>loggerEntityID<li>loggerName</li><li>loggerState<li>loggerStatus</li></ul><p><i>Only if a device entity has a STATUS different from NORMAL</i>:</p><ul><li>deviceEntityID<li>deviceName</li><li>deviceState<li>deviceSerialNumber</li><li>deviceManufacturer</li><li>deviceStatus</li></ul><hr><strong>Example (CURL)</strong><br><p style="font-family:'Consolas'">curl --request https://api.auroravision.net/api/rest/v1/plant/12345678/status --header "X-AuroraVision-Token:Abcdef1ghi2=?//lmno3456pqvw789yz!"</p>
      operationId: GetPlantStatus
      parameters:
      - name: entityID
        in: path
        description: 'Plant ID in Aurora Vision'
        required: true
        style: simple
        schema:
          type: integer
          format: int32
          example: '12345678'
      - name: X-AuroraVision-Token
        in: header
        description: 'Aurora Vision Access Token'
        required: true
        style: simple
        schema:
          type: string
          example: 'Abcdef1ghi2=?//lmno3456pqvw789yz!'
      responses:
        200:
          description: 'Ok'
          content:
           application/json:
              example: 
               result: {
                  plantEntityID: 12345678,
                  plantName: "Name",
                  plantState: "active",
                  plantStatus: "MEDIUM",
                  loggerStatuses: [
                    {
                      loggerEntityID: 12345678,
                      loggerName: "A0:A0:A0:A0:A0:A0",
                      loggerState: "active",
                      loggerStatus: "MEDIUM",
                      deviceStatuses: [
                          {
                            deviceEntityID: 12345678,
                            deviceName: "inverter_001_",
